name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: Core / Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['8', '11', '17', '21', '25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify core
        run: mvn -q verify
      - name: Audit core runtime dependencies
        run: mvn dependency:tree -Dscope=runtime

  full-verification:
    name: Full verification / Java 21
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'
      - name: Verify all adapters
        env:
          JAVASPEC_GRADLE_BIN: gradle
        run: scripts/verify-all.sh
