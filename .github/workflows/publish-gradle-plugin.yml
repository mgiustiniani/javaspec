name: Publish Gradle Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: Gradle plugin version to publish
        required: true
        default: 1.0.0-RC1

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Verify publication request
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          missing=0
          for name in GRADLE_PUBLISH_KEY GRADLE_PUBLISH_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit "$missing"

          configured_version="$(awk -F"'" '/^version = / { print $2; exit }' javaspec-gradle-plugin/build.gradle)"
          if [ "$configured_version" != "$REQUESTED_VERSION" ]; then
            echo "::error::Requested version ${REQUESTED_VERSION} does not match build version ${configured_version}."
            exit 1
          fi

          release_tag="v${REQUESTED_VERSION}"
          if ! git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" >/dev/null; then
            echo "::error::Release tag ${release_tag} does not exist."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$release_tag" HEAD; then
            echo "::error::Release tag ${release_tag} is not in the production main history."
            exit 1
          fi

          core_pom="https://repo.maven.apache.org/maven2/io/github/jvmspec/javaspec/${REQUESTED_VERSION}/javaspec-${REQUESTED_VERSION}.pom"
          if ! curl --fail --silent --head "$core_pom" >/dev/null; then
            echo "::error::Core ${REQUESTED_VERSION} is not available from Maven Central."
            exit 1
          fi

      - name: Verify and publish Gradle plugin
        working-directory: javaspec-gradle-plugin
        run: gradle clean test publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
