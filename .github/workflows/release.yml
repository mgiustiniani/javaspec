name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: central
          server-username: SONATYPE_TOKEN_USER
          server-password: SONATYPE_TOKEN_PASS
          settings-path: ${{ github.workspace }}/.github/maven-settings.xml

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gpg-agent.conf
          gpg-agent restart

      - name: Publish to Maven Central
        run: |
          mvn -q deploy -pl . -P release -DperformRelease=true
          mvn -q deploy -f javaspec-maven-plugin/pom.xml -P release -DperformRelease=true
          mvn -q deploy -f javaspec-junit-platform-engine/pom.xml -P release -DperformRelease=true
          mvn -q deploy -f javaspec-bytecode-doubles/pom.xml -P release -DperformRelease=true
        env:
          SONATYPE_TOKEN_USER: ${{ secrets.SONATYPE_TOKEN_USER }}
          SONATYPE_TOKEN_PASS: ${{ secrets.SONATYPE_TOKEN_PASS }}
