name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: sonatype-releases
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_PASSWORD

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gpg-agent.conf
          gpg-agent restart

      - name: Publish to Maven Central
        run: |
          mvn -q deploy -pl . -P release -DperformRelease=true \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
          mvn -q deploy -f javaspec-maven-plugin/pom.xml -P release -DperformRelease=true \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
          mvn -q deploy -f javaspec-junit-platform-engine/pom.xml -P release -DperformRelease=true \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
          mvn -q deploy -f javaspec-bytecode-doubles/pom.xml -P release -DperformRelease=true \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
